ignoredOptionalDependencies:
  - "@parcel/watcher"
  - fsevents

patchedDependencies:
  "@react-leaflet/core": patches/react-leaflet-core.patch
  leaflet: patches/leaflet.patch
  leaflet-geonames: patches/leaflet-geonames.patch
  leaflet-gesture-handling: patches/leaflet-gesture-handling.patch
  leaflet.locatecontrol: patches/leaflet.locatecontrol.patch
  leaflet.sync: patches/leaflet.sync.patch
  leaflet.vectorgrid: patches/leaflet.vectorgrid.patch
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
